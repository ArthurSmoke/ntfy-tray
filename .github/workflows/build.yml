name: Build macOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '16.0'
        
    - name: Build app
      run: |
        mkdir -p NtfyTray.app/Contents/MacOS
        mkdir -p NtfyTray.app/Contents/Resources
        
        # Build for ARM64
        swiftc Sources/*.swift Sources/Views/*.swift \
          -o NtfyTray-arm64 \
          -framework SwiftUI \
          -framework UserNotifications \
          -framework AppKit \
          -target arm64-apple-macosx12.0
        
        # Build for x86_64
        swiftc Sources/*.swift Sources/Views/*.swift \
          -o NtfyTray-x86_64 \
          -framework SwiftUI \
          -framework UserNotifications \
          -framework AppKit \
          -target x86_64-apple-macosx12.0
        
        # Create universal binary
        lipo -create NtfyTray-arm64 NtfyTray-x86_64 -output NtfyTray.app/Contents/MacOS/NtfyTray
        rm NtfyTray-arm64 NtfyTray-x86_64
        
        cp Info.plist NtfyTray.app/Contents/
        cp ntfy.icns NtfyTray.app/Contents/Resources/AppIcon.icns
        chmod +x NtfyTray.app/Contents/MacOS/NtfyTray
        
    - name: Create DMG
      run: |
        mkdir -p dmg_folder
        cp -r NtfyTray.app dmg_folder/
        ln -s /Applications dmg_folder/Applications
        
        hdiutil create -volname "Ntfy Tray" \
          -srcfolder dmg_folder \
          -ov -format UDZO \
          NtfyTray.dmg
        
        rm -rf dmg_folder
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NtfyTray-${{ github.sha }}
        path: |
          NtfyTray.app
          NtfyTray.dmg
        retention-days: 30
        
    - name: Zip app bundle for release
      if: startsWith(github.ref, 'refs/tags/')
      run: |
        ditto -c -k --keepParent NtfyTray.app NtfyTray.app.zip
        
    - name: Create release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          NtfyTray.dmg
          NtfyTray.app.zip
        draft: true
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
